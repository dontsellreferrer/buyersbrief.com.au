<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyers Brief — Comparable Market Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #4A90D9;
  --sky-light: rgba(74,144,217,0.1);
  --rose: #E8B4B8;
  --steel: #7FA8D4;
  --offwhite: #F4F1EC;
  --charcoal: #1E1E1E;
  --c2: #252525;
  --c3: #2E2E2E;
  --rule: rgba(127,168,212,0.12);
  --green: #4CAF7D;
  --amber: #E8A44A;
  --red: #E8614A;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Figtree',sans-serif;
  background:var(--charcoal);
  color:var(--offwhite);
  min-height:100vh;
}

body::before {
  content:''; position:fixed; inset:0;
  background:radial-gradient(circle at 20% 20%, rgba(74,144,217,0.06) 0%, transparent 50%),
             radial-gradient(circle at 80% 80%, rgba(232,180,184,0.04) 0%, transparent 40%);
  pointer-events:none; z-index:0;
}

.page { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:40px 24px 80px; }

/* ── HEADER ── */
.cma-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:28px; padding-bottom:20px;
  border-bottom:1px solid var(--rule);
}
.cma-header-left {}
.cma-label {
  font-family:'Figtree',sans-serif; font-size:10px; font-weight:500;
  color:var(--steel); letter-spacing:2px; text-transform:uppercase;
  margin-bottom:6px;
  display:flex; align-items:center; gap:8px;
}
.cma-label-dot { width:5px; height:5px; background:var(--rose); border-radius:50%; }
.cma-address {
  font-family:'Outfit',sans-serif; font-size:22px; font-weight:700;
  color:var(--offwhite); letter-spacing:-0.5px; margin-bottom:4px;
}
.cma-sub {
  font-family:'Figtree',sans-serif; font-size:13px; color:var(--steel);
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.cma-sub .dot { width:3px; height:3px; background:var(--steel); border-radius:50%; opacity:0.4; }
.cma-meta {
  text-align:right;
  display:flex; flex-direction:column; gap:4px; align-items:flex-end;
}
.cma-id { font-family:'Outfit',sans-serif; font-size:11px; font-weight:500; color:var(--steel); }
.cma-date { font-family:'Figtree',sans-serif; font-size:10px; color:rgba(127,168,212,0.4); }
.confidence-pill {
  font-family:'Figtree',sans-serif; font-size:9px; font-weight:500;
  padding:3px 10px; border-radius:10px; letter-spacing:1px; text-transform:uppercase;
}
.conf-high { background:rgba(76,175,125,0.15); color:var(--green); border:1px solid rgba(76,175,125,0.25); }
.conf-medium { background:rgba(232,164,74,0.15); color:var(--amber); border:1px solid rgba(232,164,74,0.25); }
.conf-low { background:rgba(232,97,74,0.15); color:var(--red); border:1px solid rgba(232,97,74,0.25); }

/* ── VALUATION BANNER ── */
.valuation-banner {
  background:var(--c2); border:1px solid rgba(74,144,217,0.2);
  border-radius:12px; padding:24px 28px; margin-bottom:20px;
  position:relative; overflow:hidden;
}
.valuation-banner::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--sky), var(--rose));
}
.val-title {
  font-family:'Figtree',sans-serif; font-size:10px; font-weight:500;
  color:var(--steel); letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:16px;
}
.val-range {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:0;
  margin-bottom:16px;
}
.val-item { text-align:center; position:relative; padding:0 12px; }
.val-item + .val-item::before {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:1px; background:var(--rule);
}
.val-item-label {
  font-family:'Figtree',sans-serif; font-size:10px; color:var(--steel);
  margin-bottom:4px; letter-spacing:0.5px;
}
.val-item-price {
  font-family:'Outfit',sans-serif; font-size:24px; font-weight:700;
  letter-spacing:-0.5px;
}
.val-conservative { color:var(--steel); }
.val-midpoint { color:var(--rose); font-size:30px; }
.val-optimistic { color:var(--steel); }
.val-item-sub { font-family:'Figtree',sans-serif; font-size:10px; color:rgba(127,168,212,0.4); margin-top:2px; }

/* Value range bar */
.val-bar-wrap { margin-bottom:8px; }
.val-bar-track {
  height:6px; background:rgba(127,168,212,0.12);
  border-radius:3px; position:relative; margin-bottom:4px;
}
.val-bar-fill {
  position:absolute; top:0; bottom:0; border-radius:3px;
  background:linear-gradient(90deg, var(--steel), var(--sky), var(--steel));
}
.val-bar-mid {
  position:absolute; top:-3px; bottom:-3px; width:3px;
  background:var(--rose); border-radius:2px;
  transform:translateX(-50%);
}
.val-bar-labels {
  display:flex; justify-content:space-between;
  font-family:'Figtree',sans-serif; font-size:9px; color:rgba(127,168,212,0.4);
}

/* Asking assessment */
.asking-row {
  display:flex; align-items:center; gap:10px;
  padding-top:14px; border-top:1px solid var(--rule);
}
.asking-label { font-family:'Figtree',sans-serif; font-size:12px; color:var(--steel); flex:1; }
.asking-badge {
  font-family:'Outfit',sans-serif; font-size:10px; font-weight:600;
  padding:4px 12px; border-radius:8px; letter-spacing:0.5px;
}
.asking-poa { background:var(--sky-light); color:var(--sky); }

/* ── LIAM ASSESSMENT ── */
.liam-card {
  background:var(--c2); border:1px solid var(--rule);
  border-left:3px solid var(--sky); border-radius:0 10px 10px 0;
  padding:16px 20px; margin-bottom:20px;
  display:flex; gap:14px; align-items:flex-start;
}
.liam-av {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg, #4A6F8A, #2E4A5F);
  border:1.5px solid rgba(74,144,217,0.3);
  display:flex; align-items:center; justify-content:center;
  font-family:'Outfit',sans-serif; font-size:12px; font-weight:700; color:white;
}
.liam-content {}
.liam-name { font-family:'Outfit',sans-serif; font-size:10px; font-weight:600; color:var(--sky); letter-spacing:0.5px; margin-bottom:5px; }
.liam-text { font-family:'Figtree',sans-serif; font-size:13px; font-weight:300; color:var(--offwhite); line-height:1.65; margin-bottom:8px; }
.liam-nego {
  font-family:'Figtree',sans-serif; font-size:11px; font-style:italic;
  color:var(--rose); line-height:1.5;
  padding-top:8px; border-top:1px solid rgba(232,180,184,0.15);
}

/* ── SECTION HEADERS ── */
.section { margin-bottom:20px; }
.section-hdr {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
}
.section-title {
  font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; color:var(--offwhite);
}
.section-rule { flex:1; height:1px; background:var(--rule); }
.section-count {
  font-family:'Figtree',sans-serif; font-size:10px; color:var(--steel);
}

/* ── COMPARABLES TABLE ── */
.comps-table { width:100%; border-collapse:collapse; }
.comps-table th {
  font-family:'Figtree',sans-serif; font-size:9px; font-weight:500;
  color:var(--steel); letter-spacing:1.5px; text-transform:uppercase;
  padding:8px 12px; text-align:left;
  border-bottom:1px solid var(--rule);
  background:rgba(255,255,255,0.02);
}
.comps-table th:not(:first-child) { text-align:right; }
.comps-table td {
  padding:12px 12px; border-bottom:1px solid rgba(127,168,212,0.06);
  vertical-align:top;
}
.comps-table tr:last-child td { border-bottom:none; }
.comps-table tr:hover td { background:rgba(255,255,255,0.02); }

.comp-rank {
  font-family:'Outfit',sans-serif; font-size:11px; font-weight:700; color:var(--sky);
  width:24px; flex-shrink:0;
}
.comp-addr-cell {}
.comp-addr {
  font-family:'Outfit',sans-serif; font-size:12px; font-weight:600; color:var(--offwhite);
  margin-bottom:2px;
}
.comp-meta {
  font-family:'Figtree',sans-serif; font-size:10px; color:var(--steel);
  display:flex; gap:6px; align-items:center; flex-wrap:wrap;
}
.comp-meta .mdot { width:2px; height:2px; background:var(--steel); border-radius:50%; opacity:0.4; }
.comp-note {
  font-family:'Figtree',sans-serif; font-size:10px; color:rgba(127,168,212,0.45);
  font-style:italic; margin-top:3px;
}
.comp-price {
  font-family:'Outfit',sans-serif; font-size:13px; font-weight:700;
  color:var(--offwhite); text-align:right; white-space:nowrap;
}
.comp-date {
  font-family:'Figtree',sans-serif; font-size:10px; color:var(--steel);
  text-align:right; white-space:nowrap;
}
.comp-land {
  font-family:'Figtree',sans-serif; font-size:11px; color:var(--steel);
  text-align:right; white-space:nowrap;
}
.comp-pm2 {
  font-family:'Figtree',sans-serif; font-size:11px; color:var(--steel);
  text-align:right; white-space:nowrap;
}
.similarity-pill {
  font-family:'Figtree',sans-serif; font-size:8px; font-weight:500;
  padding:2px 7px; border-radius:6px; white-space:nowrap;
  display:inline-block; margin-top:3px;
}
.sim-high { background:rgba(76,175,125,0.12); color:var(--green); }
.sim-medium { background:rgba(232,164,74,0.12); color:var(--amber); }
.sim-low { background:rgba(127,168,212,0.1); color:var(--steel); }

/* ── MARKET STATS ── */
.stats-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
  margin-bottom:20px;
}
.stat-card {
  background:var(--c2); border:1px solid var(--rule);
  border-radius:8px; padding:14px 16px;
}
.stat-label {
  font-family:'Figtree',sans-serif; font-size:9px; font-weight:500;
  color:var(--steel); letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:6px;
}
.stat-value {
  font-family:'Outfit',sans-serif; font-size:20px; font-weight:700;
  color:var(--offwhite); letter-spacing:-0.5px;
}
.stat-sub {
  font-family:'Figtree',sans-serif; font-size:9px; color:rgba(127,168,212,0.4);
  margin-top:2px;
}
.stat-trend {
  font-family:'Figtree',sans-serif; font-size:10px; font-weight:500;
  margin-top:4px;
}
.trend-down { color:var(--red); }
.trend-up { color:var(--green); }

/* ── SUBJECT SUMMARY ── */
.subject-card {
  background:var(--c2); border:1px solid rgba(74,144,217,0.15);
  border-radius:10px; padding:18px 20px; margin-bottom:20px;
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr;
  gap:16px;
}
.subj-item {}
.subj-label {
  font-family:'Figtree',sans-serif; font-size:9px; font-weight:500;
  color:var(--steel); letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:4px;
}
.subj-value {
  font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; color:var(--offwhite);
}

/* ── NOTES ── */
.notes-card {
  background:rgba(255,255,255,0.02); border:1px solid var(--rule);
  border-radius:8px; padding:14px 18px;
}
.notes-label {
  font-family:'Figtree',sans-serif; font-size:9px; font-weight:500;
  color:var(--steel); letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:6px;
}
.notes-text {
  font-family:'Figtree',sans-serif; font-size:11px; color:rgba(127,168,212,0.5);
  line-height:1.6; font-style:italic;
}

/* ── REVIEW BLOCK ── */
.review-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
}
.review-item {
  display:flex; align-items:flex-start; gap:8px;
  font-family:'Figtree',sans-serif; font-size:11px; color:var(--steel);
  line-height:1.4;
}
.review-check { color:var(--green); font-size:12px; flex-shrink:0; }

/* ── FOOTER ── */
.cma-footer {
  margin-top:28px; padding-top:16px;
  border-top:1px solid var(--rule);
  display:flex; justify-content:space-between; align-items:center;
}
.footer-brand {
  font-family:'Outfit',sans-serif; font-size:12px; color:var(--steel);
}
.footer-brand b { color:var(--offwhite); font-weight:700; }
.footer-brand em { color:var(--sky); font-weight:300; font-style:normal; letter-spacing:1.5px; }
.footer-disclaimer {
  font-family:'Figtree',sans-serif; font-size:9px; color:rgba(127,168,212,0.35);
  max-width:400px; text-align:right; line-height:1.5;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}
.page > * { animation:fadeUp 0.4s ease both; }
.page > *:nth-child(1) { animation-delay:0.05s; }
.page > *:nth-child(2) { animation-delay:0.1s; }
.page > *:nth-child(3) { animation-delay:0.15s; }
.page > *:nth-child(4) { animation-delay:0.2s; }
.page > *:nth-child(5) { animation-delay:0.25s; }
.val-accordion-btn { display: none; }


/* ═══════════════════════════════════════════
   MOBILE RESPONSIVE
   Desktop: all three values side by side (unchanged)
   Mobile: midpoint prominent, conservative/optimistic
           in accordions above and below
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {

  /* Back nav */
  .back-nav, div[style*="position:fixed"][style*="z-index:200"] {
    padding: 0 16px !important; height: 44px !important;
  }

  /* Page */
  .page { padding: 56px 16px 48px !important; max-width: 100%; }

  /* Property header */
  .cma-address { font-size: clamp(18px, 5vw, 24px) !important; }
  .cma-sub { flex-wrap: wrap; gap: 6px; }

  /* ── VALUATION — accordion layout ── */
  /* Hide the three-col grid layout on mobile */
  .val-range { display: block; }

  /* Conservative accordion (above midpoint) */
  .val-item-conservative {
    display: none;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
    margin-bottom: 14px;
    text-align: center;
  }
  .val-item-conservative.open { display: block; }

  /* Midpoint — always shown, full width, prominent */
  .val-item-midpoint {
    text-align: center;
    padding: 0;
  }
  .val-item-midpoint .val-item-price { font-size: 38px; }

  /* Optimistic accordion (below midpoint) */
  .val-item-optimistic {
    display: none;
    border-top: 1px solid var(--rule);
    padding-top: 14px;
    margin-top: 14px;
    text-align: center;
  }
  .val-item-optimistic.open { display: block; }

  /* Accordion toggle buttons */
  .val-accordion-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    font-family: 'Figtree', sans-serif;
    font-size: 11px;
    color: rgba(127,168,212,0.45);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.2s;
  }
  .val-accordion-btn:hover { color: var(--steel); }
  .val-accordion-btn.open { color: var(--steel); }

  /* Bar labels smaller */
  .val-bar-labels { font-size: 9px; }

  /* Stats */
  .stats-grid { grid-template-columns: 1fr 1fr !important; gap: 8px; }
  .stat-card { padding: 12px 14px; }
  .stat-value { font-size: 18px !important; }

  /* Comps */
  .comp-header { flex-direction: column; gap: 4px; }
  .comp-price { font-size: 18px !important; }
  .comp-attrs { flex-wrap: wrap; gap: 6px; }

  /* Liam */
  .liam-card { flex-direction: column; gap: 10px; }
  .liam-text { font-size: 13px; }

  /* Review grid */
  .review-grid { grid-template-columns: 1fr !important; }

  /* Footer */
  .cma-footer { flex-direction: column; gap: 10px; }
  .footer-disclaimer { font-size: 10px; }
}

@media (max-width: 420px) {
  .stats-grid { grid-template-columns: 1fr 1fr !important; }
}


/* ── ICON STATS ── */
.prop-icon-stat {
  display:inline-flex; align-items:center; gap:5px;
  font-family:'Figtree',sans-serif; font-size:13px; color:var(--offwhite);
  margin-right:12px;
}
.prop-icon-stat svg { color:var(--steel); opacity:0.7; flex-shrink:0; }
.comp-icon-stat {
  display:inline-flex; align-items:center; gap:4px;
  font-family:'Figtree',sans-serif; font-size:11px; color:var(--steel);
  margin-right:8px;
}
.comp-icon-stat svg { opacity:0.6; flex-shrink:0; }
.stat-icon { color:var(--steel); opacity:0.5; display:block; margin-bottom:8px; }


@media (max-width: 768px) {
  .cma-header {
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
  }
  .cma-meta {
    text-align: left;
    align-items: flex-start;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 8px;
  }
  .cma-address { font-size: clamp(18px, 5vw, 26px) !important; }
  .cma-sub { flex-wrap: wrap; gap: 8px; }
  .prop-icon-stat { font-size: 12px; }
}

</style>
</head>

        <button class="val-accordion-btn" id="btnConservative" onclick="toggleConservative()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>

        </button>
        <div class="val-item val-item-conservative" id="valConservative">
          <div class="val-item-label">Conservative</div>
          <div class="val-item-price val-conservative">${v.conservative_display || '—'}</div>
          <div class="val-item-sub">floor estimate</div>
        </div>

        <!-- Midpoint — always shown -->
        <div class="val-item val-item-midpoint">
          <div class="val-item-label">Midpoint</div>
          <div class="val-item-price val-midpoint">${v.midpoint_display || '—'}</div>
          <div class="val-item-sub">fair value estimate</div>
        </div>

        <!-- Optimistic — desktop: column 3 | mobile: accordion below midpoint -->
        <div class="val-item val-item-optimistic" id="valOptimistic">
          <div class="val-item-label">Optimistic</div>
          <div class="val-item-price val-optimistic">${v.optimistic_display || '—'}</div>
          <div class="val-item-sub">ceiling estimate</div>
        </div>
        <button class="val-accordion-btn" id="btnOptimistic" onclick="toggleOptimistic()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Show optimistic estimate
        </button>
      </div>

      <!-- Range bar -->
      <div class="val-bar-wrap">
        <div class="val-bar-track">
          <div class="val-bar-fill" style="left:0;right:0;"></div>
          <div class="val-bar-mid" style="left:${midPct}%;"></div>
        </div>
        <div class="val-bar-labels">
          <span>${v.conservative_display || ''}</span>
          <span style="color:var(--rose);">▲ midpoint ${v.midpoint_display || ''}</span>
          <span>${v.optimistic_display || ''}</span>
        </div>
      </div>

      <div class="asking-row">
        <div class="asking-label">
          ${v.confidence_reason}
        </div>
        <div class="asking-badge asking-poa">
          ${s.asking_price == null ? 'Price on application' : s.asking_display}

      </div>
